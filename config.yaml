site:
  name: "Medicare Monitor"
  tagline: "Tracking Medicare news, policy, and coverage changes."
  base_url: "https://www.MedicareMonitor.co"
  adsense_publisher_id: "ca-pub-XXXXXXXXXXXXXXXX"  # ← fill in after AdSense approval

feeds:
  - category: "Medicare News"
    url: "https://kffhealthnews.org/feed/"

  - category: "Medicare News"
    url: "https://medcitynews.com/feed/"

  - category: "Healthcare Policy"
    url: "https://www.statnews.com/feed/"

  - category: "Healthcare Policy"
    url: "https://feeds.npr.org/1128/rss.xml"

  - category: "Senior Health"
    url: "https://www.medpagetoday.com/rss/headlines.xml"

  - category: "Senior Health"
    url: "https://www.healthcaredive.com/feeds/news/"

  - category: "Drug Coverage"
    url: "https://www.fiercehealthcare.com/rss/xml"

  - category: "Drug Coverage"
    url: "https://rss.politico.com/healthcare.xml"

  - category: "Industry News"
    url: "https://thehill.com/policy/healthcare/feed/"

settings:
  max_posts_per_feed: 10      # articles pulled per feed per run
  summary_word_limit: 120     # words shown in the card excerpt
  posts_per_page: 12          # cards per paginated page
  max_total_articles: 1000    # hard cap on articles.json (oldest trimmed first)
